<h2>选择前端外壳的视觉风格</h2>
<p class="subtitle">3D动漫悬浮图标 + 悬浮菜单的几种视觉方向</p>

<div class="cards">
  <div class="card" data-choice="glass" onclick="toggleSelect(this)">
    <div class="card-image">
      <div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 24px; padding: 40px; text-align: center;">
        <div style="background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); border-radius: 20px; width: 80px; height: 80px; margin: 0 auto; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 32px rgba(0,0,0,0.3); transform: perspective(500px) rotateX(10deg) rotateY(-10deg);">
          <span style="font-size: 32px;">🤖</span>
        </div>
        <div style="margin-top: 20px; display: flex; gap: 12px; justify-content: center;">
          <div style="background: rgba(255,255,255,0.2); border-radius: 12px; padding: 8px 16px; color: white; font-size: 12px;">⚙️ 设置</div>
          <div style="background: rgba(255,255,255,0.2); border-radius: 12px; padding: 8px 16px; color: white; font-size: 12px;">💬 对话</div>
          <div style="background: rgba(255,255,255,0.2); border-radius: 12px; padding: 8px 16px; color: white; font-size: 12px;">🛠️ 工具</div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>毛玻璃风格</h3>
      <p>磨砂玻璃效果 + 渐变背景，现代感强，动漫感适中</p>
    </div>
  </div>

  <div class="card" data-choice="anime" onclick="toggleSelect(this)">
    <div class="card-image">
      <div style="background: linear-gradient(135deg, #ff6b9d 0%, #c44569 50%, #1e3c72 100%); border-radius: 24px; padding: 40px; text-align: center;">
        <div style="background: linear-gradient(145deg, #ffeaa7, #fdcb6e); border-radius: 50%; width: 80px; height: 80px; margin: 0 auto; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 30px rgba(253,203,110,0.6), inset 0 -5px 15px rgba(0,0,0,0.2);">
          <span style="font-size: 36px;">🌟</span>
        </div>
        <div style="margin-top: 20px; display: flex; gap: 8px; justify-content: center; transform: rotate(-2deg);">
          <div style="background: linear-gradient(145deg, #ff6b9d, #c44569); border-radius: 16px; padding: 10px 14px; color: white; font-size: 11px; box-shadow: 0 4px 12px rgba(196,69,105,0.4);">⚙️</div>
          <div style="background: linear-gradient(145deg, #74b9ff, #0984e3); border-radius: 16px; padding: 10px 14px; color: white; font-size: 11px; box-shadow: 0 4px 12px rgba(9,132,227,0.4);">💬</div>
          <div style="background: linear-gradient(145deg, #a29bfe, #6c5ce7); border-radius: 16px; padding: 10px 14px; color: white; font-size: 11px; box-shadow: 0 4px 12px rgba(108,92,231,0.4);">🛠️</div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>动漫萌宠风格</h3>
      <p>圆润发光按钮 + 彩虹渐变，动漫感强，活泼可爱</p>
    </div>
  </div>

  <div class="card" data-choice="minimal" onclick="toggleSelect(this)">
    <div class="card-image">
      <div style="background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%); border-radius: 24px; padding: 40px; text-align: center;">
        <div style="background: linear-gradient(145deg, #667eea, #764ba2); border-radius: 24px; width: 70px; height: 70px; margin: 0 auto; display: flex; align-items: center; justify-content: center; box-shadow: 0 12px 40px rgba(102,126,234,0.5); transform: perspective(800px) rotateX(15deg);">
          <span style="font-size: 30px;">AI</span>
        </div>
        <div style="margin-top: 20px; display: flex; gap: 10px; justify-content: center;">
          <div style="background: transparent; border: 2px solid rgba(255,255,255,0.3); border-radius: 10px; padding: 8px 14px; color: rgba(255,255,255,0.8); font-size: 12px;">设置</div>
          <div style="background: transparent; border: 2px solid rgba(255,255,255,0.3); border-radius: 10px; padding: 8px 14px; color: rgba(255,255,255,0.8); font-size: 12px;">对话</div>
          <div style="background: transparent; border: 2px solid rgba(255,255,255,0.3); border-radius: 10px; padding: 8px 14px; color: rgba(255,255,255,0.8); font-size: 12px;">工具</div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>极简科幻风格</h3>
      <p>深色背景 + 霓虹边框，科幻感强，低调内敛</p>
    </div>
  </div>
</div>
